<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK5 转换工具</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background: #4285f4;
            color: #fff;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        #result {
            width: 100%;
            height: 220px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fff;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 14px;
        }
        .tip {
            color: #666;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tip">剪贴板格式：host|port|user|pass|expire</div>
        <button id="convert">读取剪贴板并转换为 SK5</button>
        <textarea id="result" readonly placeholder="转换结果将显示在这里"></textarea>
    </div>

    <script>
        const btn = document.getElementById('convert');
        const res = document.getElementById('result');

        btn.addEventListener('click', async () => {
            try {
                // 读取剪贴板
                const text = await navigator.clipboard.readText();
                const parts = text.trim().split('|');

                if (parts.length < 5) {
                    res.value = '格式错误\n需要：host|port|user|pass|expire';
                    return;
                }

                const host = parts[0];
                const port = parts[1];
                const user = parts[2];
                const pass = parts[3];
                const expire = parts[4];

                // Nekobox sk5 标准格式
                const sk5 = `sk5://${user}:${pass}@${host}:${port}#${expire}`;

                // 显示
                res.value = sk5;

                // 自动复制
                await navigator.clipboard.writeText(sk5);

            } catch (e) {
                res.value = '失败：' + e.message;
            }
        });
    </script>
</body>
</html>
