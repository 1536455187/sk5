<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK5 转换工具</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background: #4285f4;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .result {
            background: #fff;
            padding: 14px;
            border-radius: 8px;
            word-break: break-all;
            white-space: pre-wrap;
            min-height: 60px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="convertBtn">从剪贴板读取并转换为 SK5</button>
        <div class="result" id="result">结果将显示在这里</div>
    </div>

    <script>
        const btn = document.getElementById('convertBtn');
        const res = document.getElementById('result');

        btn.addEventListener('click', async () => {
            try {
                // 1. 读取剪贴板
                const clipText = await navigator.clipboard.readText();
                const t = clipText.trim();

                // 2. 按 | 分割
                const arr = t.split('|');
                if (arr.length < 5) {
                    res.textContent = '格式不正确：需要 host|port|user|pass|expire';
                    return;
                }

                const host = arr[0].trim();
                const port = arr[1].trim();
                const user = arr[2].trim();
                const pass = arr[3].trim();
                const expire = arr[4].trim();

                // 3. 生成 NekoBox sk5 格式
                const sk5 = `sk5://${user}:${pass}@${host}:${port}#${expire}`;

                // 4. 显示
                res.textContent = sk5;

                // 5. 自动复制
                await navigator.clipboard.writeText(sk5);

            } catch (e) {
                res.textContent = '失败：' + e.message;
            }
        });
    </script>
</body>
</html>
