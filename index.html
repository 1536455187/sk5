<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读取剪贴板示例</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        #display {
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed #ccc;
            min-height: 50px;
            word-break: break-all;
            background: #f9f9f9;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h3>剪贴板内容读取器</h3>
    
    <button id="readBtn">点击读取剪贴板</button>

    <div id="display">内容将显示在这里...</div>

    <script>
        const btn = document.getElementById('readBtn');
        const display = document.getElementById('display');

        btn.addEventListener('click', async () => {
            try {
                // 调用浏览器标准的 Clipboard API
                const text = await navigator.clipboard.readText();
                
                if (text) {
                    display.innerText = "读取到的内容：\n" + text;
                    display.style.color = "black";
                } else {
                    display.innerText = "剪贴板是空的";
                }
            } catch (err) {
                // 如果用户拒绝权限或环境不支持
                display.innerText = "读取失败: " + err.message;
                display.style.color = "red";
                console.error('无法读取剪贴板: ', err);
            }
        });
    </script>
</body>
</html>
