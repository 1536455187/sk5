<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>读取剪贴板</title>
    <style>
        body {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
            font-family: system-ui;
        }
        #result {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 15px;
            min-height: 100px;
            margin-top: 15px;
            border-radius: 6px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>读取剪贴板内容</h2>
    <button id="readBtn">点击读取剪贴板</button>
    <div id="result">内容将显示在这里...</div>

    <script>
        const btn = document.getElementById('readBtn');
        const result = document.getElementById('result');

        btn.addEventListener('click', async () => {
            try {
                // 读取剪贴板文本
                const text = await navigator.clipboard.readText();
                result.textContent = text;
            } catch (err) {
                result.textContent = '读取失败：' + err.message + '\n请允许剪贴板权限，或在 HTTPS/localhost 下运行';
            }
        });
    </script>
</body>
</html>
